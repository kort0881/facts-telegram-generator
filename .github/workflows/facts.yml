name: Generate Facts

on:
  schedule:
    - cron: "0 6 * * *"  # Every day at 06:00 UTC
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create config.yaml from environment variable
        env:
          CONFIG_YAML: ${{ secrets.CONFIG_YAML }}
        run: |
          if [ -z "$CONFIG_YAML" ]; then
            echo "ERROR: CONFIG_YAML secret not set. Please add it to GitHub Secrets."
            exit 1
          fi
          echo "$CONFIG_YAML" > config.yaml

      - name: Run facts generator
        run: |
          python scripts/facts_generator.py

      - name: Commit and push generated posts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/posts/ config.yaml || true
          git commit -m "Add generated facts" || echo "Nothing to commit"
          git push || echo "Nothing to push"
