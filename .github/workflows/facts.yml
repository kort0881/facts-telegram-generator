name: Generate Facts
on:
  schedule:
    - cron: "0 5,9,13,17,21 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GROQ_API_KEY:        ${{ secrets.GROQ_API_KEY }}
      # ИСПРАВЛЕНИЕ #1: имена переменных совпадают с get_env() в скрипте
      TELEGRAM_BOT_TOKEN:  ${{ secrets.BOT_TOKEN }}
      CHANNEL_ID:          ${{ secrets.TG_CHAT_ID }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Init cache dir (if missing)
        # ИСПРАВЛЕНИЕ #3: создаём папку, которую реально использует скрипт
        run: mkdir -p cache_facts

      - name: Run facts generator
        timeout-minutes: 10
        # ИСПРАВЛЕНИЕ #2: правильный путь к скрипту
        run: python facts_autopost.py

      - name: Commit state files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # ИСПРАВЛЕНИЕ #3: коммитим то, что скрипт реально пишет
          git add cache_facts/facts_state.json cache_facts/facts_groq_budget.json
          git diff --staged --quiet || git commit -m "chore: update state [skip ci]"
          git push || echo "Nothing to push"

