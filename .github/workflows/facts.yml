name: Generate Facts
on:
  schedule:
    - cron: "0 5,9,13,17,21 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
      CHANNEL_ID: ${{ secrets.TG_CHAT_ID }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Debug structure
        run: |
          pwd
          echo "=== Root files ==="
          ls -la *.py || echo "No .py in root"
          echo "=== Scripts dir ==="
          ls -la scripts/*.py 2>/dev/null || echo "No scripts/ or no .py"
          echo "=== Requirements ==="
          cat requirements.txt || echo "No requirements.txt"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || pip install groq python-telegram-bot httpx

      - name: Init cache dir
        run: mkdir -p cache_facts

      - name: Run facts generator
        timeout-minutes: 10
        run: |
          # Пробуем разные пути - найдём нужный
          python scripts/facts_autopost.py || python facts_autopost.py || python scripts/facts_generator.py || echo "File not found"

      - name: Commit state files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cache_facts/ || echo "No cache_facts changes"
          git diff --staged --quiet || git commit -m "chore: update facts state [skip ci]"
          git push || echo "Nothing to push"
