name: Generate Facts

on:
  schedule:
    - cron: "0 5,9,13,17,21 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      TG_BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
      TG_CHAT_ID:   ${{ secrets.TG_CHAT_ID }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create config.yaml
        run: |
          cat > config.yaml << 'EOF'
          ai:
            url: "https://api.groq.com/openai/v1/chat/completions"
            model: "llama-3.3-70b-versatile"
          logging:
            level: "INFO"
          EOF

      - name: Init state files (if missing)
        run: |
          touch used_links.txt dead_links.txt used_posts.txt used_topics.txt

      - name: Run facts generator
        timeout-minutes: 10
        run: python scripts/facts_generator.py

      - name: Commit state files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add used_links.txt dead_links.txt used_posts.txt used_topics.txt
          git diff --staged --quiet || git commit -m "chore: update state [skip ci]"
          git push || echo "Nothing to push"


