name: Generate Facts
on:
  schedule:
    - cron: "0 5,9,13,17,21 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
      CHANNEL_ID: ${{ secrets.TG_CHAT_ID }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare files
        run: |
          mkdir -p cache_facts
          # Копируем реальный файл ссылок из репозитория
          cp links.txt facts_links_clean.txt

      - name: Generate and post facts
        timeout-minutes: 10
        run: python scripts/facts_generator.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cache_facts/ facts_links_clean.txt
          git diff --staged --quiet || git commit -m "chore: update facts cache [skip ci]"
          git push || echo "No changes to commit"
